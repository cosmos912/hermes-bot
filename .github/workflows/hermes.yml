name: Hermes Check

on:
  schedule:
    - cron: "*/2 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        run: python check_hermes.py

    env:
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
